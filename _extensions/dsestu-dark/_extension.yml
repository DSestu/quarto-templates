title: dsestu-dark
author: David Sestu
version: 1.0.0
quarto-required: ">=1.4.0"

contributes:
  formats:
    html:
      theme:
        - cosmo
        - theme.scss
      css: styles.css

      filters:
        - source-export.lua

      toc: true
      toc-location: left
      toc-depth: 3
      toc-title: "Contents"
      toc-expand: 2
      number-sections: false
      smooth-scroll: true
      anchor-sections: true

      # KaTeX instead of MathJax: lightweight, self-contained, and avoids the
      # /extensions/MathMenu.js 404 that Pandoc's MathJax v2 fallback triggers
      # under `embed-resources: true`.
      html-math-method: katex

      code-tools: false
      code-copy: hover
      code-link: true
      code-line-numbers: false
      code-overflow: scroll
      code-block-bg: false
      code-block-border-left: false
      highlight-style:
        light: github-dark
        dark: github-dark

      fig-cap-location: bottom
      tbl-cap-location: top
      fig-responsive: true
      df-print: paged
      citations-hover: true
      footnotes-hover: true
      crossrefs-hover: true
      link-external-icon: false
      link-external-newwindow: true

      page-layout: article
      grid:
        sidebar-width: 240px
        body-width: 1100px
        margin-width: 0px
        gutter-width: 2.25rem

      mainfont: 'Geist, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif'
      monofont: '"Geist Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace'
      fontsize: 16.5px
      linestretch: 1.6
      title-block-banner: false
      title-block-style: default

      include-in-header:
        - text: |
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">

      include-after-body:
        - text: |
            <script>
            (function () {
              "use strict";

              function ready(fn) {
                if (document.readyState !== "loading") { fn(); }
                else { document.addEventListener("DOMContentLoaded", fn); }
              }

              // ─── Theme toggle (runs immediately to avoid flash) ─────────
              (function () {
                var THEME_KEY = "dsestu-theme";
                var stored = null;
                try { stored = localStorage.getItem(THEME_KEY); } catch (e) {}
                var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
                var theme = stored || (prefersDark ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", theme);
              })();

              ready(function () {
                // ─── Desync background animations ────────────────────────
                // Each animated element gets a random negative animation-delay
                // so cycles drift apart across the page.
                (function desyncAnimations() {
                  function r() { return -(Math.random() * 12 + 0.2).toFixed(2) + "s"; }
                  document.querySelectorAll(
                    ".callout, .callout > .callout-header, h2, h3, div.sourceCode, pre, .cell-output, .footnote-ref, a.footnote-ref"
                  ).forEach(function (el) {
                    el.style.setProperty("--anim-delay", r());
                    el.style.setProperty("--anim-delay-2", r());
                    el.style.setProperty("--anim-delay-3", r());
                  });
                })();

                // ─── Code-fold accordion setup ───────────────────────────
                // Keep native <details open> always true; control visibility
                // via a .fold-closed class so CSS can animate height: auto ↔ 0.
                var allFolds = document.querySelectorAll("details.code-fold");
                allFolds.forEach(function (d) {
                  var wasOpen = d.open;
                  d.open = true;
                  if (!wasOpen) d.classList.add("fold-closed");
                  var summary = d.querySelector("summary");
                  if (summary) {
                    summary.addEventListener("click", function (e) {
                      e.preventDefault();
                      d.classList.toggle("fold-closed");
                      recomputeFoldGroups();
                    });
                  }
                });

                // Two .code-fold details are "consecutive" when the DOM range
                // between them contains no cell-output and no non-cell content
                // (headings, paragraphs, etc.). Cell outputs MUST break the group
                // so a code block followed by its output isn't fused with the
                // next code block.
                function isConsecutiveSibling(a, b) {
                  if (!a || !b) return false;
                  var aCell = a.closest(".cell");
                  var bCell = b.closest(".cell");
                  if (!aCell || !bCell) return false;
                  if (aCell.parentElement !== bCell.parentElement) return false;
                  // The cells must be adjacent siblings under the same parent.
                  var node = aCell.nextSibling;
                  while (node && node !== bCell) {
                    if (node.nodeType === 1) return false;
                    if (node.nodeType === 3 && node.textContent.trim()) return false;
                    node = node.nextSibling;
                  }
                  if (node !== bCell) return false;
                  // Inside cell A, after its code-fold details: anything except
                  // empty whitespace breaks the group (most importantly any
                  // .cell-output*).
                  var inside = a.nextSibling;
                  while (inside) {
                    if (inside.nodeType === 1) return false;
                    if (inside.nodeType === 3 && inside.textContent.trim()) return false;
                    inside = inside.nextSibling;
                  }
                  // Inside cell B, before its code-fold details: same rule.
                  inside = b.previousSibling;
                  while (inside) {
                    if (inside.nodeType === 1) return false;
                    if (inside.nodeType === 3 && inside.textContent.trim()) return false;
                    inside = inside.previousSibling;
                  }
                  return true;
                }

                function recomputeFoldGroups() {
                  // Clear previous group classes
                  allFolds.forEach(function (d) {
                    d.classList.remove("fold-group-first", "fold-group-middle", "fold-group-last", "fold-group-solo");
                    var s = d.querySelector("summary");
                    if (s) s.removeAttribute("data-fold-count");
                  });

                  // In global-folded mode, every summary collapses uniformly via
                  // CSS — skip per-group fusion (which would display:none the
                  // middle/last summaries and kill their animation).
                  if (document.body.classList.contains("code-folded")) return;

                  // Walk in document order, building groups of consecutive .fold-closed
                  var groups = [];
                  var current = null;
                  allFolds.forEach(function (d) {
                    if (!d.classList.contains("fold-closed")) {
                      if (current) { groups.push(current); current = null; }
                      return;
                    }
                    if (current && isConsecutiveSibling(current[current.length - 1], d)) {
                      current.push(d);
                    } else {
                      if (current) groups.push(current);
                      current = [d];
                    }
                  });
                  if (current) groups.push(current);

                  groups.forEach(function (g) {
                    if (g.length === 1) {
                      g[0].classList.add("fold-group-solo");
                      return;
                    }
                    g.forEach(function (d, idx) {
                      if (idx === 0) d.classList.add("fold-group-first");
                      else if (idx === g.length - 1) d.classList.add("fold-group-last");
                      else d.classList.add("fold-group-middle");
                    });
                    var firstSummary = g[0].querySelector("summary");
                    if (firstSummary) {
                      firstSummary.setAttribute("data-fold-count", String(g.length));
                      firstSummary.setAttribute("title", g.length + " collapsed code blocks");
                    }
                  });
                }
                recomputeFoldGroups();

                // ─── Code-fold toggle button ─────────────────────────────
                var FOLD_KEY = "dsestu-code-folded";
                var foldBtn = document.createElement("button");
                foldBtn.className = "code-fold-toggle";
                foldBtn.type = "button";
                foldBtn.setAttribute("aria-label", "Collapse all code blocks");
                foldBtn.innerHTML =
                  '<svg class="fold-icon fold-icon-collapse" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                    '<polyline points="4 14 10 14 10 20"/>' +
                    '<polyline points="20 10 14 10 14 4"/>' +
                    '<line x1="14" y1="10" x2="21" y2="3"/>' +
                    '<line x1="3" y1="21" x2="10" y2="14"/>' +
                  '</svg>' +
                  '<svg class="fold-icon fold-icon-expand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                    '<polyline points="15 3 21 3 21 9"/>' +
                    '<polyline points="9 21 3 21 3 15"/>' +
                    '<line x1="21" y1="3" x2="14" y2="10"/>' +
                    '<line x1="3" y1="21" x2="10" y2="14"/>' +
                  '</svg>';
                document.body.appendChild(foldBtn);

                function applyFold(folded) {
                  foldBtn.setAttribute(
                    "aria-label",
                    folded ? "Expand all code blocks" : "Collapse all code blocks"
                  );
                  document.body.classList.toggle("code-folded", folded);
                  document.querySelectorAll("details.code-fold").forEach(function (d) {
                    d.classList.toggle("fold-closed", folded);
                  });
                  if (typeof recomputeFoldGroups === "function") recomputeFoldGroups();
                }

                var foldedInit = true;
                try {
                  var stored = localStorage.getItem(FOLD_KEY);
                  if (stored === "0") foldedInit = false;
                } catch (e) {}
                applyFold(foldedInit);

                foldBtn.addEventListener("click", function () {
                  var folded = !document.body.classList.contains("code-folded");
                  applyFold(folded);
                  try { localStorage.setItem(FOLD_KEY, folded ? "1" : "0"); } catch (e) {}
                });
                foldBtn.setAttribute("data-shortcut", "C");

                // ─── Theme toggle button ─────────────────────────────────
                var THEME_KEY = "dsestu-theme";
                var themeBtn = document.createElement("button");
                themeBtn.className = "theme-toggle";
                themeBtn.type = "button";
                themeBtn.setAttribute("aria-label", "Toggle color theme");
                themeBtn.innerHTML =
                  '<svg class="theme-icon theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                    '<circle cx="12" cy="12" r="4"/>' +
                    '<line x1="12" y1="2"  x2="12" y2="4"/>' +
                    '<line x1="12" y1="20" x2="12" y2="22"/>' +
                    '<line x1="2"  y1="12" x2="4"  y2="12"/>' +
                    '<line x1="20" y1="12" x2="22" y2="12"/>' +
                    '<line x1="4.93"  y1="4.93"  x2="6.34"  y2="6.34"/>' +
                    '<line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>' +
                    '<line x1="4.93"  y1="19.07" x2="6.34"  y2="17.66"/>' +
                    '<line x1="17.66" y1="6.34"  x2="19.07" y2="4.93"/>' +
                  '</svg>' +
                  '<svg class="theme-icon theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                    '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>' +
                  '</svg>';
                document.body.appendChild(themeBtn);

                function applyTheme(t) {
                  document.documentElement.setAttribute("data-theme", t);
                  themeBtn.setAttribute("aria-label", "Switch to " + (t === "dark" ? "light" : "dark") + " theme");
                }
                applyTheme(document.documentElement.getAttribute("data-theme") || "dark");

                themeBtn.addEventListener("click", function () {
                  var current = document.documentElement.getAttribute("data-theme") || "dark";
                  var next = current === "dark" ? "light" : "dark";
                  // Smooth cross-fade via the View Transitions API; falls back
                  // to CSS transitions on color/background-color (see styles.css).
                  if (document.startViewTransition) {
                    document.startViewTransition(function () { applyTheme(next); });
                  } else {
                    applyTheme(next);
                  }
                  try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
                });
                themeBtn.setAttribute("data-shortcut", "D");

                // ─── Source export button (.qmd / .ipynb) ────────────────
                // The Lua filter embeds the source in #dsestu-source as
                // either .qmd or .ipynb (outputs stripped). A single button
                // opens a dropdown with both formats; if the requested format
                // differs from the embedded one, we convert in-browser.
                (function setupSourceExport() {
                  var src = document.getElementById("dsestu-source");
                  if (!src) return;
                  var sourceKind = src.getAttribute("data-kind") || "qmd";
                  var sourceText = src.value;

                  // Derive filename from the document's title (camelCase,
                  // alphanumerics only) so OS file managers stay happy.
                  function sanitizeName(title) {
                    var words = (title || "")
                      .replace(/[^A-Za-z0-9\s_-]+/g, " ")
                      .split(/[\s_\-]+/)
                      .filter(Boolean);
                    if (!words.length) return "document";
                    return words.map(function (w) { return w.toLowerCase(); }).join("_");
                  }
                  function getDocTitle() {
                    var el = document.querySelector(
                      "header#title-block-header h1.title, " +
                      "#title-block-header h1, h1.title"
                    );
                    if (el && el.textContent.trim()) return el.textContent.trim();
                    return (document.title || "").trim() || "document";
                  }
                  var sourceName = sanitizeName(getDocTitle());

                  function ipynbToQmd(content) {
                    var nb;
                    try { nb = JSON.parse(content); } catch (e) { return ""; }
                    var lang = "python";
                    try {
                      lang = (nb.metadata && nb.metadata.kernelspec &&
                              nb.metadata.kernelspec.language) || "python";
                    } catch (e) {}
                    var lines = ["---", "title: \"" + sourceName + "\"", "---", ""];
                    (nb.cells || []).forEach(function (cell) {
                      var s = Array.isArray(cell.source) ? cell.source.join("") : (cell.source || "");
                      if (cell.cell_type === "markdown") {
                        lines.push(s);
                      } else if (cell.cell_type === "code") {
                        lines.push("```{" + lang + "}");
                        lines.push(s);
                        lines.push("```");
                      } else if (cell.cell_type === "raw") {
                        lines.push(s);
                      }
                      lines.push("");
                    });
                    return lines.join("\n");
                  }

                  function qmdToIpynb(content) {
                    // Strip YAML front matter
                    var body = content.replace(/^---\n[\s\S]*?\n---\n?/, "");
                    var cells = [];
                    var fenceRe = /```\{([^}\s]+)[^}]*\}\n([\s\S]*?)```\s*\n?/g;
                    var lastIdx = 0;
                    var m;
                    while ((m = fenceRe.exec(body)) !== null) {
                      var before = body.slice(lastIdx, m.index);
                      if (before.trim()) {
                        cells.push({
                          cell_type: "markdown",
                          metadata: {},
                          source: before.split("\n").map(function (l, i, a) {
                            return i === a.length - 1 ? l : l + "\n";
                          })
                        });
                      }
                      cells.push({
                        cell_type: "code",
                        metadata: {},
                        execution_count: null,
                        outputs: [],
                        source: m[2].replace(/\n$/, "").split("\n").map(function (l, i, a) {
                          return i === a.length - 1 ? l : l + "\n";
                        })
                      });
                      lastIdx = fenceRe.lastIndex;
                    }
                    var trailing = body.slice(lastIdx);
                    if (trailing.trim()) {
                      cells.push({
                        cell_type: "markdown",
                        metadata: {},
                        source: trailing.split("\n").map(function (l, i, a) {
                          return i === a.length - 1 ? l : l + "\n";
                        })
                      });
                    }
                    return JSON.stringify({
                      cells: cells,
                      metadata: {
                        kernelspec: {
                          display_name: "Python 3",
                          language: "python",
                          name: "python3"
                        }
                      },
                      nbformat: 4,
                      nbformat_minor: 5
                    }, null, 1);
                  }

                  function downloadBlob(content, filename, mime) {
                    var blob = new Blob([content], { type: mime });
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement("a");
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(function () {
                      document.body.removeChild(a);
                      URL.revokeObjectURL(url);
                    }, 0);
                  }

                  function exportAs(format) {
                    if (format === "qmd") {
                      var content = sourceKind === "qmd"
                        ? sourceText
                        : ipynbToQmd(sourceText);
                      downloadBlob(content, sourceName + ".qmd", "text/markdown");
                    } else if (format === "ipynb") {
                      var c = sourceKind === "ipynb"
                        ? sourceText
                        : qmdToIpynb(sourceText);
                      downloadBlob(c, sourceName + ".ipynb", "application/x-ipynb+json");
                    }
                  }

                  // Build the dropdown trigger button + menu.
                  var exportBtn = document.createElement("button");
                  exportBtn.className = "export-toggle";
                  exportBtn.type = "button";
                  exportBtn.setAttribute("aria-label", "Export source file");
                  exportBtn.setAttribute("aria-haspopup", "menu");
                  exportBtn.setAttribute("aria-expanded", "false");
                  exportBtn.innerHTML =
                    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" ' +
                    'stroke="currentColor" stroke-width="1.8" stroke-linecap="round" ' +
                    'stroke-linejoin="round" aria-hidden="true">' +
                      '<path d="M14 3v5h5"/>' +
                      '<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>' +
                      '<line x1="12" y1="12" x2="12" y2="18"/>' +
                      '<polyline points="9 15 12 18 15 15"/>' +
                    '</svg>' +
                    '<svg class="export-caret" width="10" height="10" viewBox="0 0 24 24" ' +
                    'fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" ' +
                    'stroke-linejoin="round" aria-hidden="true">' +
                      '<polyline points="6 9 12 15 18 9"/>' +
                    '</svg>';
                  document.body.appendChild(exportBtn);

                  var exportMenu = document.createElement("div");
                  exportMenu.className = "export-menu";
                  exportMenu.setAttribute("role", "menu");
                  exportMenu.innerHTML =
                    '<button type="button" class="export-menu-item" role="menuitem" data-format="qmd">' +
                      '<span class="export-menu-ext">.qmd</span>' +
                      '<span class="export-menu-desc">Quarto markdown</span>' +
                    '</button>' +
                    '<button type="button" class="export-menu-item" role="menuitem" data-format="ipynb">' +
                      '<span class="export-menu-ext">.ipynb</span>' +
                      '<span class="export-menu-desc">Jupyter notebook (no outputs)</span>' +
                    '</button>';
                  document.body.appendChild(exportMenu);

                  function setMenuOpen(open) {
                    exportMenu.classList.toggle("is-open", open);
                    exportBtn.setAttribute("aria-expanded", String(open));
                    if (open) {
                      // Position the menu directly below the trigger.
                      var r = exportBtn.getBoundingClientRect();
                      exportMenu.style.top = (r.bottom + 6) + "px";
                      exportMenu.style.left = r.left + "px";
                    }
                  }

                  exportBtn.addEventListener("click", function (e) {
                    e.stopPropagation();
                    setMenuOpen(!exportMenu.classList.contains("is-open"));
                  });
                  exportMenu.addEventListener("click", function (e) {
                    var item = e.target.closest(".export-menu-item");
                    if (!item) return;
                    var fmt = item.getAttribute("data-format");
                    exportAs(fmt);
                    setMenuOpen(false);
                  });
                  document.addEventListener("click", function (e) {
                    if (!exportMenu.classList.contains("is-open")) return;
                    if (exportMenu.contains(e.target) || exportBtn.contains(e.target)) return;
                    setMenuOpen(false);
                  });
                  document.addEventListener("keydown", function (e) {
                    if (e.key === "Escape" && exportMenu.classList.contains("is-open")) {
                      setMenuOpen(false);
                      exportBtn.focus();
                    }
                  });
                })();

                var toc = document.querySelector("nav[role='doc-toc'], #TOC");

                // ─── Toggle button ───────────────────────────────────────
                // Storage key bumped (v2) to drop stale "hidden" preferences
                // from earlier visits — the TOC is visible by default now.
                var STORAGE_KEY = "dsestu-toc-hidden-v2";
                var btn = document.createElement("button");
                btn.className = "toc-toggle";
                btn.type = "button";
                btn.setAttribute("aria-label", "Toggle contents");
                btn.setAttribute("aria-expanded", "true");
                btn.innerHTML =
                  '<svg class="toc-icon toc-icon-close" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                    '<line x1="4" y1="6" x2="20" y2="6"/>' +
                    '<line x1="4" y1="12" x2="14" y2="12"/>' +
                    '<line x1="4" y1="18" x2="18" y2="18"/>' +
                  '</svg>' +
                  '<svg class="toc-icon toc-icon-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                    '<line x1="4" y1="6" x2="20" y2="6"/>' +
                    '<line x1="4" y1="12" x2="20" y2="12"/>' +
                    '<line x1="4" y1="18" x2="20" y2="18"/>' +
                  '</svg>';
                document.body.appendChild(btn);

                function applyHidden(hidden) {
                  document.body.classList.toggle("toc-hidden", hidden);
                  btn.setAttribute("aria-expanded", String(!hidden));
                  if (toc) toc.setAttribute("aria-hidden", String(hidden));
                }

                // Default: TOC visible. Only honour an explicit "1" — anything
                // else (null, "0", malformed) keeps the TOC on screen.
                var tocHiddenInit = false;
                try {
                  if (localStorage.getItem(STORAGE_KEY) === "1") tocHiddenInit = true;
                } catch (e) {}
                applyHidden(tocHiddenInit);

                btn.addEventListener("click", function () {
                  var hidden = !document.body.classList.contains("toc-hidden");
                  applyHidden(hidden);
                  try { localStorage.setItem(STORAGE_KEY, hidden ? "1" : "0"); } catch (e) {}
                });
                btn.setAttribute("data-shortcut", "Tab");
                var tocBtn = btn;

                // ─── Section accordion ───────────────────────────────────
                // Every h2/h3 section becomes click-collapsible. Quarto adds
                // class="collapsed" to the heading when the source uses
                // `## Title {.collapsed}` — those start collapsed.
                function setupSectionAccordion() {
                  document.querySelectorAll(
                    "section.level1, section.level2, section.level3"
                  ).forEach(function (section) {
                    var heading = section.querySelector(":scope > h1, :scope > h2, :scope > h3");
                    if (!heading) return;
                    // Wrap everything after the heading in a .section-body div
                    // so we can animate its height to 0.
                    var body = section.querySelector(":scope > .section-body");
                    if (!body) {
                      body = document.createElement("div");
                      body.className = "section-body";
                      var node = heading.nextSibling;
                      while (node) {
                        var next = node.nextSibling;
                        body.appendChild(node);
                        node = next;
                      }
                      section.appendChild(body);
                    }
                    heading.classList.add("section-toggle");
                    heading.setAttribute("role", "button");
                    heading.setAttribute("tabindex", "0");
                    // Insert the morphing chevron (dash ↔ V) as the first
                    // child of the heading, before the section number/title.
                    if (!heading.querySelector(":scope > .section-chev")) {
                      var chev = document.createElement("span");
                      chev.className = "section-chev";
                      chev.setAttribute("aria-hidden", "true");
                      heading.insertBefore(chev, heading.firstChild);
                    }
                    var initiallyCollapsed = heading.classList.contains("collapsed");
                    setSectionState(section, initiallyCollapsed);
                    heading.addEventListener("click", function (e) {
                      // Clicks on the anchor link (anchor.js) should not toggle.
                      var anchor = e.target.closest("a.anchorjs-link");
                      if (anchor) return;
                      e.preventDefault();
                      setSectionState(
                        section,
                        !section.classList.contains("section-collapsed")
                      );
                    });
                    heading.addEventListener("keydown", function (e) {
                      if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        setSectionState(
                          section,
                          !section.classList.contains("section-collapsed")
                        );
                      }
                    });
                  });
                }
                function setSectionState(section, collapsed) {
                  section.classList.toggle("section-collapsed", collapsed);
                  var heading = section.querySelector(":scope > h1, :scope > h2, :scope > h3");
                  if (heading) heading.setAttribute("aria-expanded", String(!collapsed));
                }
                setupSectionAccordion();

                // ─── Empty cell-output sweep ─────────────────────────────
                // Cells whose output rendered to nothing (no text, no media)
                // get a marker class so CSS can hide them and their wrapper.
                function isVisuallyEmpty(el) {
                  if (!el) return false;
                  if ((el.textContent || "").trim()) return false;
                  if (el.querySelector(
                    "img, svg, canvas, iframe, video, audio, table, " +
                    ".js-plotly-plot, .plotly-graph-div, .plot-container, " +
                    ".dataTables_wrapper, picture, embed, object"
                  )) return false;
                  return true;
                }
                function sweepEmptyOutputs() {
                  document.querySelectorAll(
                    ".cell-output, .cell-output-display, .cell-output-stdout, .cell-output-stderr"
                  ).forEach(function (el) {
                    el.classList.toggle("cell-output-empty", isVisuallyEmpty(el));
                  });
                }
                sweepEmptyOutputs();
                // Run again later in case async renderers (Plotly, dtale, etc.)
                // populate outputs after first paint.
                setTimeout(sweepEmptyOutputs, 400);
                setTimeout(sweepEmptyOutputs, 1500);

                // ─── Hover-tracked section + cursor-following tooltip ───
                // A single delegated mouseover listener tracks the innermost
                // accordion-wired section under the cursor. When the cursor is
                // over the section's heading, a floating tooltip follows the
                // pointer telling the user how to collapse/expand it.
                var hoveredSection = null;
                var hoveredHeading = null;

                var sectionTip = document.createElement("div");
                sectionTip.className = "section-tip";
                sectionTip.setAttribute("aria-hidden", "true");
                document.body.appendChild(sectionTip);

                var lastTipText = "";
                function refreshTipText() {
                  if (!hoveredSection) return;
                  var collapsed = hoveredSection.classList.contains("section-collapsed");
                  var text = "Click or press F to " + (collapsed ? "expand" : "collapse");
                  if (text !== lastTipText) {
                    sectionTip.textContent = text;
                    lastTipText = text;
                  }
                }
                function positionTip(x, y) {
                  var w = sectionTip.offsetWidth;
                  var h = sectionTip.offsetHeight;
                  var nx = x + 16;
                  var ny = y + 18;
                  if (nx + w + 8 > window.innerWidth) nx = x - w - 16;
                  if (ny + h + 8 > window.innerHeight) ny = y - h - 16;
                  sectionTip.style.left = nx + "px";
                  sectionTip.style.top = ny + "px";
                }
                function showTip() {
                  refreshTipText();
                  sectionTip.classList.add("is-visible");
                }
                function hideTip() {
                  sectionTip.classList.remove("is-visible");
                }

                document.addEventListener("mouseover", function (e) {
                  if (!e.target || !e.target.closest) return;
                  hoveredSection = e.target.closest(
                    "section.level1, section.level2, section.level3"
                  );
                  if (hoveredSection &&
                      !hoveredSection.querySelector(":scope > .section-toggle")) {
                    hoveredSection = null;
                  }
                  hoveredHeading = e.target.closest(".section-toggle");
                  if (hoveredHeading && hoveredSection) {
                    showTip();
                  } else {
                    hideTip();
                  }
                });

                document.addEventListener("mousemove", function (e) {
                  if (!sectionTip.classList.contains("is-visible")) return;
                  refreshTipText();
                  positionTip(e.clientX, e.clientY);
                });

                document.addEventListener("mouseout", function (e) {
                  if (!hoveredHeading) return;
                  var related = e.relatedTarget;
                  if (related && hoveredHeading.contains(related)) return;
                  if (related && related.closest && related.closest(".section-toggle") === hoveredHeading) return;
                  hideTip();
                });

                window.addEventListener("scroll", hideTip, { passive: true });

                // ─── Keyboard shortcuts ──────────────────────────────────
                // C = toggle code-fold mode, D = toggle dark/light theme,
                // Tab = toggle TOC, F = toggle the section under the cursor.
                // Ignored while typing in a form field.
                document.addEventListener("keydown", function (e) {
                  if (e.ctrlKey || e.metaKey || e.altKey) return;
                  var t = e.target;
                  if (t && (
                    t.tagName === "INPUT" ||
                    t.tagName === "TEXTAREA" ||
                    t.tagName === "SELECT" ||
                    t.isContentEditable
                  )) return;
                  var k = e.key;
                  if (k === "c" || k === "C") {
                    e.preventDefault();
                    foldBtn.click();
                  } else if (k === "d" || k === "D") {
                    e.preventDefault();
                    themeBtn.click();
                  } else if (k === "Tab") {
                    e.preventDefault();
                    tocBtn.click();
                  } else if (k === "f" || k === "F") {
                    if (hoveredSection &&
                        typeof setSectionState === "function") {
                      e.preventDefault();
                      setSectionState(
                        hoveredSection,
                        !hoveredSection.classList.contains("section-collapsed")
                      );
                    }
                  }
                });

                // ─── Plotly: make plots fill their container width ───────
                // Plotly figures created with width=... in px.* have an explicit
                // layout.width that overrides the container. We clear it via
                // relayout({width: null, autosize: true}) and then call
                // Plots.resize() to redraw at the container's current width.
                function resizeOnePlot(div) {
                  if (!div || !window.Plotly) return;
                  // Wait until Plotly has finished initialising this div
                  if (!div._fullLayout) return;
                  try {
                    var update = { autosize: true, width: null };
                    var p = window.Plotly.relayout(div, update);
                    if (p && p.then) {
                      p.then(function () { window.Plotly.Plots.resize(div); });
                    } else {
                      window.Plotly.Plots.resize(div);
                    }
                  } catch (e) {
                    try { window.Plotly.Plots.resize(div); } catch (e2) {}
                  }
                }

                function resizeAllPlots() {
                  if (typeof window.Plotly === "undefined") return;
                  document.querySelectorAll(
                    ".js-plotly-plot, .plotly-graph-div"
                  ).forEach(resizeOnePlot);
                }

                function whenPlotlyReady(cb, attempts) {
                  attempts = attempts == null ? 60 : attempts;
                  if (typeof window.Plotly !== "undefined") { cb(); return; }
                  if (attempts <= 0) return;
                  setTimeout(function () { whenPlotlyReady(cb, attempts - 1); }, 120);
                }
                whenPlotlyReady(function () {
                  // Plotly may render plots in stages — try a few times so we
                  // catch divs that finished initialising slightly later.
                  resizeAllPlots();
                  setTimeout(resizeAllPlots, 200);
                  setTimeout(resizeAllPlots, 600);
                  setTimeout(resizeAllPlots, 1500);

                  // ResizeObserver — react when any plot container changes size
                  if (typeof ResizeObserver !== "undefined") {
                    var ro = new ResizeObserver(function (entries) {
                      entries.forEach(function (e) {
                        if (e.target.matches(".js-plotly-plot, .plotly-graph-div")) {
                          resizeOnePlot(e.target);
                        }
                      });
                    });
                    document.querySelectorAll(
                      ".js-plotly-plot, .plotly-graph-div"
                    ).forEach(function (div) { ro.observe(div); });
                  }

                  // ─── Fullscreen toggle on each plot ─────────────────────
                  function setupFullscreenButtons() {
                    document.querySelectorAll(
                      ".js-plotly-plot, .plotly-graph-div"
                    ).forEach(function (div) {
                      if (div.dataset.fsSetup) return;
                      div.dataset.fsSetup = "1";

                      // Wrap the plot so the button can be absolutely positioned
                      var wrap = document.createElement("div");
                      wrap.className = "plotly-fs-wrap";
                      div.parentNode.insertBefore(wrap, div);
                      wrap.appendChild(div);

                      var btn = document.createElement("button");
                      btn.type = "button";
                      btn.className = "plotly-fs-btn";
                      btn.setAttribute("aria-label", "Toggle fullscreen plot");
                      btn.innerHTML =
                        '<svg class="fs-icon fs-icon-enter" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                          '<polyline points="4 9 4 4 9 4"/>' +
                          '<polyline points="20 9 20 4 15 4"/>' +
                          '<polyline points="20 15 20 20 15 20"/>' +
                          '<polyline points="4 15 4 20 9 20"/>' +
                        '</svg>' +
                        '<svg class="fs-icon fs-icon-exit" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                          '<polyline points="9 4 9 9 4 9"/>' +
                          '<polyline points="15 4 15 9 20 9"/>' +
                          '<polyline points="15 20 15 15 20 15"/>' +
                          '<polyline points="9 20 9 15 4 15"/>' +
                        '</svg>';
                      wrap.appendChild(btn);

                      function toggleFS() {
                        var goFS = !wrap.classList.contains("is-fullscreen");
                        var apply = function () {
                          wrap.classList.toggle("is-fullscreen", goFS);
                          document.body.classList.toggle("has-fullscreen-plot", goFS);
                        };
                        var afterToggle = function () {
                          // Wait one frame, then resize the plot to the new bounds
                          requestAnimationFrame(function () {
                            requestAnimationFrame(function () { resizeOnePlot(div); });
                          });
                        };
                        if (document.startViewTransition) {
                          wrap.style.viewTransitionName = "plotly-fs-active";
                          var t = document.startViewTransition(apply);
                          t.finished.then(function () {
                            wrap.style.viewTransitionName = "";
                            afterToggle();
                          });
                        } else {
                          apply();
                          setTimeout(afterToggle, 320);
                        }
                      }

                      btn.addEventListener("click", function (e) {
                        e.stopPropagation();
                        toggleFS();
                      });
                    });
                  }
                  setupFullscreenButtons();
                  setTimeout(setupFullscreenButtons, 600);
                  setTimeout(setupFullscreenButtons, 1500);

                  // Escape exits fullscreen
                  document.addEventListener("keydown", function (e) {
                    if (e.key !== "Escape") return;
                    var fs = document.querySelector(".plotly-fs-wrap.is-fullscreen");
                    if (!fs) return;
                    var plot = fs.querySelector(".js-plotly-plot, .plotly-graph-div");
                    var apply = function () {
                      fs.classList.remove("is-fullscreen");
                      document.body.classList.remove("has-fullscreen-plot");
                    };
                    if (document.startViewTransition) {
                      fs.style.viewTransitionName = "plotly-fs-active";
                      var t = document.startViewTransition(apply);
                      t.finished.then(function () {
                        fs.style.viewTransitionName = "";
                        if (plot) requestAnimationFrame(function () { resizeOnePlot(plot); });
                      });
                    } else {
                      apply();
                      if (plot) setTimeout(function () { resizeOnePlot(plot); }, 320);
                    }
                  });
                });

                var plotlyResizeT = null;
                window.addEventListener("resize", function () {
                  if (plotlyResizeT) clearTimeout(plotlyResizeT);
                  plotlyResizeT = setTimeout(resizeAllPlots, 140);
                });

                // Re-resize plots after TOC toggle transition finishes
                btn.addEventListener("click", function () {
                  setTimeout(resizeAllPlots, 380);
                });

                // ─── Peek-on-hover: left edge reveals TOC while hidden ───
                var peekZone = document.createElement("div");
                peekZone.className = "toc-peek-zone";
                peekZone.setAttribute("aria-hidden", "true");
                document.body.appendChild(peekZone);

                var peekTimer = null;
                function setPeek(on) {
                  if (peekTimer) { clearTimeout(peekTimer); peekTimer = null; }
                  if (on) {
                    document.body.classList.add("toc-peek");
                  } else {
                    peekTimer = setTimeout(function () {
                      document.body.classList.remove("toc-peek");
                      peekTimer = null;
                    }, 220);
                  }
                }
                peekZone.addEventListener("mouseenter", function () { setPeek(true); });
                peekZone.addEventListener("mouseleave", function () { setPeek(false); });
                var sidebarEl = document.querySelector(".sidebar.toc-left, #quarto-sidebar");
                if (sidebarEl) {
                  sidebarEl.addEventListener("mouseenter", function () { setPeek(true); });
                  sidebarEl.addEventListener("mouseleave", function () { setPeek(false); });
                }

                if (!toc) return;

                // Wrap each TOC link's text in a .toc-label and prepend a .toc-dot.
                // Idempotent: skip if already wrapped.
                var linksByHash = {};
                toc.querySelectorAll("a").forEach(function (a) {
                  if (!a.querySelector(".toc-dot")) {
                    var text = a.textContent;
                    a.textContent = "";
                    var dot = document.createElement("span");
                    dot.className = "toc-dot";
                    dot.setAttribute("aria-hidden", "true");
                    var label = document.createElement("span");
                    label.className = "toc-label";
                    label.textContent = text;
                    a.appendChild(dot);
                    a.appendChild(label);
                  }
                  var href = a.getAttribute("href") || "";
                  if (href.charAt(0) === "#") {
                    linksByHash[href.slice(1)] = a;
                  }
                });

                // ─── Active tracking — scroll listener ────────────────────
                // Pick the heading nearest to (but above) a band ~30% from the top.
                // Quarto's native scrollspy is not reliable on this layout.
                var headings = [];
                Object.keys(linksByHash).forEach(function (id) {
                  var el = document.getElementById(id);
                  if (el) headings.push(el);
                });
                if (!headings.length) return;

                function setActive(id) {
                  var a = linksByHash[id];
                  if (!a) return;
                  toc.querySelectorAll("a.active").forEach(function (x) {
                    if (x !== a) x.classList.remove("active");
                  });
                  a.classList.add("active");
                }

                var ticking = false;
                function recompute() {
                  ticking = false;
                  var trigger = window.innerHeight * 0.3;
                  var current = headings[0];
                  for (var i = 0; i < headings.length; i++) {
                    if (headings[i].getBoundingClientRect().top <= trigger) {
                      current = headings[i];
                    } else { break; }
                  }
                  setActive(current.id);
                }

                window.addEventListener("scroll", function () {
                  if (ticking) return;
                  ticking = true;
                  requestAnimationFrame(recompute);
                }, { passive: true });
                window.addEventListener("resize", recompute);
                recompute();
              });
            })();
            </script>


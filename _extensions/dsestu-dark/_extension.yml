title: dsestu-dark
author: David Sestu
version: 1.0.0
quarto-required: ">=1.4.0"

contributes:
  formats:
    html:
      theme:
        - cosmo
        - theme.scss
      css: styles.css

      toc: true
      toc-location: left
      toc-depth: 3
      toc-title: "Contents"
      toc-expand: 2
      number-sections: false
      smooth-scroll: true
      anchor-sections: true

      code-tools: true
      code-copy: hover
      code-link: true
      code-line-numbers: false
      code-overflow: scroll
      code-block-bg: false
      code-block-border-left: false
      highlight-style:
        light: github-dark
        dark: github-dark

      fig-cap-location: bottom
      tbl-cap-location: top
      fig-responsive: true
      df-print: paged
      citations-hover: true
      footnotes-hover: true
      crossrefs-hover: true
      link-external-icon: false
      link-external-newwindow: true

      page-layout: article
      grid:
        sidebar-width: 240px
        body-width: 1100px
        margin-width: 0px
        gutter-width: 2.25rem

      mainfont: 'Geist, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif'
      monofont: '"Geist Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace'
      fontsize: 16.5px
      linestretch: 1.6
      title-block-banner: false
      title-block-style: default

      include-in-header:
        - text: |
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">

      embed-resources: false
